services:
  # Contenedor de la aplicación: PHP-FPM 8.2 + Laravel 11
  app:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    container_name: tsg_app
    restart: unless-stopped
    working_dir: /var/www/html
    volumes:
      - ./:/var/www/html
    environment:
      - DB_HOST=db
      - DB_PORT=3306
      - DB_DATABASE=tech_solutions
      - DB_USERNAME=tsg_user
      - DB_PASSWORD=tsg_pass
    depends_on:
      db:
        condition: service_healthy
    networks:
      - tsg_network

  # Contenedor del servidor web: Nginx recibe las peticiones HTTP y se las pasa a PHP-FPM
  nginx:
    image: nginx:1.27-alpine
    container_name: tsg_nginx
    restart: unless-stopped
    ports:
      - "8080:80"
    volumes:
      - ./:/var/www/html
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - app
    networks:
      - tsg_network

  # Contenedor de base de datos: MySQL 8.0
  db:
    image: mysql:8.0
    container_name: tsg_db
    restart: unless-stopped
    environment:
      - MYSQL_DATABASE=tech_solutions
      - MYSQL_USER=tsg_user
      - MYSQL_PASSWORD=tsg_pass
      - MYSQL_ROOT_PASSWORD=root_pass
    ports:
      - "3307:3306"
    volumes:
      - tsg_db_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-proot_pass"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - tsg_network

networks:
  tsg_network:
    driver: bridge

volumes:
  tsg_db_data:
